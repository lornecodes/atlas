agent:
  name: "slow-starter"
  version: "1.0.0"
  description: "Agent with expensive startup — simulates model loading"

  input:
    schema:
      type: object
      properties:
        text:
          type: string
      required: [text]

  output:
    schema:
      type: object
      properties:
        result:
          type: string
        startup_count:
          type: integer
      required: [result]

  capabilities:
    - testing
    - lifecycle

  model:
    preference: "fast"

  requires:
    platform_tools: false
    spawn_agents: false
    skills: []
