agent:
  name: "flexible-input"
  version: "1.0.0"
  description: "Agent with optional fields and complex defaults"

  input:
    schema:
      type: object
      properties:
        text:
          type: string
        options:
          type: object
          properties:
            format:
              type: string
              default: "plain"
            max_length:
              type: integer
              default: 500
          default: {}
      required: [text]

  output:
    schema:
      type: object
      properties:
        result:
          type: string
        format_used:
          type: string
      required: [result, format_used]

  capabilities: [text-processing, testing]
