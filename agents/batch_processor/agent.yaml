agent:
  name: "batch-processor"
  version: "1.0.0"
  description: "Processes arrays of items with pricing"

  input:
    schema:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              price:
                type: number
            required: [name, price]
        currency:
          type: string
          default: "USD"
      required: [items]

  output:
    schema:
      type: object
      properties:
        total:
          type: number
        count:
          type: integer
        currency:
          type: string
      required: [total, count, currency]

  capabilities: [batch-processing, testing]
